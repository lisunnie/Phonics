<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小音果 · 单词卡</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f2e6ff 0%, #e4d0ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        /* 卡片容器 —— 适配 iPhone 13 舒适比例 */
        .phone-card {
            width: 100%;
            max-width: 390px;
            background: rgba(255, 250, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: 
                0 30px 50px rgba(90, 50, 140, 0.2),
                0 0 0 2px rgba(255, 255, 255, 0.8) inset,
                0 8px 20px rgba(170, 120, 240, 0.3);
            padding: 32px 20px 40px 20px;
            border: 1px solid #f3e4ff;
        }

        /* 标题区域 - 只有标题，不列出单词 */
        .title-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .title-section h1 {
            font-size: 2.4rem;
            font-weight: 700;
            color: #3d2b60;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #dbbcff;
            margin-bottom: 8px;
        }

        .title-section .sub {
            color: #6b4f99;
            font-size: 1.1rem;
            background: #f0e2ff;
            padding: 6px 18px;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #c7a6ff;
            font-weight: 400;
        }

        /* 主单词卡片 */
        .word-container {
            background: #ffffff;
            border-radius: 120px;
            margin: 20px 0 20px 0;
            padding: 30px 0;
            border: 4px solid #d4b5ff;
            box-shadow: 0 10px 0 #8f6bc0, 0 15px 25px rgba(130, 80, 190, 0.25);
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .word-container:active {
            transform: scale(0.97);
            box-shadow: 0 5px 0 #8f6bc0, 0 10px 20px rgba(130, 80, 190, 0.25);
        }

        .main-word {
            font-size: 6.2rem;
            font-weight: 800;
            text-align: center;
            line-height: 1;
            color: #2a1b42;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-shadow: 3px 3px 0 #d4b5ff, 6px 6px 0 rgba(160, 110, 230, 0.3);
            user-select: none;
        }

        /* 发声提示 */
        .speaker-hint {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 4px;
            opacity: 0.8;
            color: #4f3580;
            font-weight: 500;
        }

        .speaker-hint span {
            font-size: 1.1rem;
            background: #eddfff;
            padding: 6px 20px;
            border-radius: 60px;
            border: 1px solid #b38df0;
        }

        /* 下一个按钮 */
        .next-btn {
            background: #b692ff;
            border: none;
            width: 86%;
            margin: 16px auto 12px;
            display: block;
            padding: 20px 12px;
            border-radius: 60px;
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 1px 1px 0 #4f3682;
            box-shadow: 0 8px 0 #6d4ca8, 0 8px 20px #a984e6;
            transition: all 0.12s ease;
            text-transform: uppercase;
            letter-spacing: 4px;
            border: 2px solid #e3ceff;
            cursor: pointer;
        }

        .next-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #6d4ca8, 0 6px 16px #a984e6;
        }

        /* 底部信息 - 只有计数，不列单词 */
        .footer-info {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            padding: 0 16px;
        }

        .badge {
            background: #e5d2ff;
            border-radius: 30px;
            padding: 6px 20px;
            font-size: 1rem;
            font-weight: 600;
            color: #3f2a68;
            border: 1px solid #ba9bef;
            box-shadow: 0 2px 6px rgba(150, 100, 210, 0.2);
        }

        .badge i {
            font-style: normal;
            background: #6946aa;
            color: white;
            padding: 2px 10px;
            border-radius: 40px;
            margin-left: 8px;
        }

        /* 释义小行 - 保留以增加趣味，但不列出单词表 */
        .meaning-row {
            text-align: center;
            margin-top: 16px;
            color: #553c82;
            font-size: 1rem;
            background: #f0e2ffc0;
            padding: 6px 12px;
            border-radius: 60px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid #caadff;
            backdrop-filter: blur(2px);
        }
    </style>
</head>
<body>
    <div class="phone-card">
        <div class="title-section">
            <h1>✨ 单词卡</h1>
            <div class="sub">点击卡片发声</div>
        </div>

        <!-- 可点击的单词区 (发音) -->
        <div class="word-container" id="wordCard">
            <div class="main-word" id="displayWord">at</div>
            <div class="speaker-hint">
                <span>🔊 听发音</span>
            </div>
        </div>

        <!-- 下一个按钮 -->
        <button class="next-btn" id="nextWordBtn">⟳ 下一个</button>

        <!-- 底部简洁信息：只显示单词数量和当前释义，不列出具体单词 -->
        <div class="meaning-row" id="meaningHint">
            📘 at (在)
        </div>
        
        <div class="footer-info">
            <div class="badge">
                共 <i id="wordCount">8</i> 个词
            </div>
        </div>
    </div>

    <script>
        (function() {
            // 严格按要求的单词列表 (但不在界面上显示列表)
            const allowedWords = ["at", "it", "in", "is", "on", "am", "an", "as"];
            
            // 当前显示的索引
            let currentIndex = 0;

            // 获取DOM元素
            const displayWordEl = document.getElementById('displayWord');
            const wordCard = document.getElementById('wordCard');
            const nextBtn = document.getElementById('nextWordBtn');
            const meaningHint = document.getElementById('meaningHint');
            const wordCountSpan = document.getElementById('wordCount');

            // 显示单词总数 (只显示数字)
            wordCountSpan.textContent = allowedWords.length;

            // 简易释义
            function getMeaningSuggestion(word) {
                const map = {
                    "at": "在 (地点/时间)",
                    "it": "它",
                    "in": "在…里面",
                    "is": "是",
                    "on": "在…上面",
                    "am": "是 (用于I)",
                    "an": "一个 (用于元音前)",
                    "as": "作为 / 如同"
                };
                return map[word] || '英语单词';
            }

            // 更新界面
            function updateDisplay() {
                const word = allowedWords[currentIndex];
                displayWordEl.textContent = word;
                meaningHint.textContent = '📘 ' + word + ' · ' + getMeaningSuggestion(word);
            }

            // 发音函数
            function speakCurrentWord() {
                const word = allowedWords[currentIndex];
                if (!word) return;
                
                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                    
                    const utterance = new SpeechSynthesisUtterance(word);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9;
                    utterance.pitch = 1.2;
                    utterance.volume = 1;
                    
                    window.speechSynthesis.speak(utterance);
                } else {
                    alert('浏览器不支持语音合成。');
                }
            }

            // 切换到下一个单词 (完全随机，可能重复)
            function nextWord() {
                const newIndex = Math.floor(Math.random() * allowedWords.length);
                currentIndex = newIndex;
                updateDisplay();
            }

            // 初始化随机
            function initRandom() {
                currentIndex = Math.floor(Math.random() * allowedWords.length);
                updateDisplay();
            }

            // 绑定事件
            wordCard.addEventListener('click', function(e) {
                e.stopPropagation();
                speakCurrentWord();
            });

            nextBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                nextWord();
            });

            // 启动
            initRandom();

        })();
    </script>
</body>
</html>
