<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小音果 · 指定单词集</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f0e7ff 0%, #e2d1ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        /* 卡片容器 —— 适配 iPhone 13 舒适比例 */
        .phone-card {
            width: 100%;
            max-width: 390px;            /* iPhone 13 逻辑宽度 */
            background: rgba(255, 245, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: 
                0 30px 50px rgba(80, 40, 120, 0.2),
                0 0 0 2px rgba(255, 255, 255, 0.8) inset,
                0 8px 20px rgba(160, 100, 200, 0.3);
            padding: 32px 20px 40px 20px;
            border: 1px solid #f0e0ff;
        }

        /* 标题 & 装饰 */
        .title-section {
            text-align: center;
            margin-bottom: 24px;
        }

        .title-section h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #3a2b5a;
            letter-spacing: 4px;
            text-shadow: 2px 2px 0 #cfb5ff;
            margin-bottom: 4px;
        }

        .title-section .letters-hint {
            color: #4d3a73;
            font-weight: 500;
            font-size: 1.1rem;
            background: #f3e9ff;
            padding: 8px 16px;
            border-radius: 60px;
            display: inline-block;
            box-shadow: 0 2px 8px #c2a9f0;
            border: 1px solid #b28dff;
        }

        .letters-hint span {
            font-weight: 700;
            color: #2d1b54;
            background: #e2d0ff;
            padding: 0 8px;
            border-radius: 20px;
        }

        /* 主单词卡片 */
        .word-container {
            background: #ffffffd9;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 120px;
            margin: 20px 0 20px 0;
            padding: 30px 0;
            border: 3px solid #c9a9ff;
            box-shadow: 0 10px 0 #8a66c9, 0 15px 25px rgba(110, 70, 160, 0.25);
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .word-container:active {
            transform: scale(0.97);
            box-shadow: 0 5px 0 #8a66c9, 0 10px 20px rgba(110, 70, 160, 0.25);
        }

        .main-word {
            font-size: 6.2rem;
            font-weight: 800;
            text-align: center;
            line-height: 1;
            color: #2e1e44;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-shadow: 3px 3px 0 #c9a9ff, 6px 6px 0 rgba(150, 100, 220, 0.3);
            user-select: none;
        }

        /* 发声提示 (小图标) */
        .speaker-hint {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 4px;
            opacity: 0.8;
            color: #4a3470;
            font-weight: 500;
        }

        .speaker-hint span {
            font-size: 1.1rem;
            background: #ebddff;
            padding: 6px 20px;
            border-radius: 60px;
            border: 1px solid #b18de0;
        }

        /* 下一个按钮 */
        .next-btn {
            background: #b28eff;
            border: none;
            width: 86%;
            margin: 16px auto 12px;
            display: block;
            padding: 20px 12px;
            border-radius: 60px;
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 1px 1px 0 #3e2b63;
            box-shadow: 0 8px 0 #624a99, 0 8px 20px #9d7de5;
            transition: all 0.12s ease;
            text-transform: uppercase;
            letter-spacing: 4px;
            border: 2px solid #ddc8ff;
            cursor: pointer;
        }

        .next-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #624a99, 0 6px 16px #9d7de5;
        }

        /* 底部小统计 & 释义提示 */
        .footer-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 20px;
            padding: 0 16px;
        }

        .badge {
            background: #e5d5ff;
            border-radius: 30px;
            padding: 6px 16px;
            font-size: 1rem;
            font-weight: 600;
            color: #392a57;
            border: 1px solid #b594ee;
        }

        .badge i {
            font-style: normal;
            background: #624a9c;
            color: #ffffff;
            padding: 2px 10px;
            border-radius: 40px;
            margin-left: 6px;
        }

        .light {
            color: #4a3777;
            font-size: 0.95rem;
            font-weight: 400;
            background: #f0e5ff;
            padding: 4px 14px;
            border-radius: 30px;
        }
    </style>
</head>
<body>
    <div class="phone-card">
        <div class="title-section">
            <h1>🔤 我的单词卡</h1>
            <div class="letters-hint">
                指定词 · <span>at it in is on am an as</span>
            </div>
        </div>

        <!-- 可点击的单词区 (发音) -->
        <div class="word-container" id="wordCard">
            <div class="main-word" id="displayWord">at</div>
            <div class="speaker-hint">
                <span>🔊 点击这里发音</span>
            </div>
        </div>

        <!-- 下一个按钮 -->
        <button class="next-btn" id="nextWordBtn">⟳ 下一个</button>

        <!-- 底部小统计 & 释义提示 -->
        <div class="footer-info">
            <div class="badge">📚 8个单词 <i id="wordCount">8</i></div>
            <div class="light" id="meaningHint">· at (在) ·</div>
        </div>
    </div>

    <script>
        (function() {
            // 严格按要求的单词列表
            const allowedWords = ["at", "it", "in", "is", "on", "am", "an", "as"];
            
            // 当前显示的索引
            let currentIndex = 0;  // 初始默认为0，但我们会随机初始化

            // 获取DOM元素
            const displayWordEl = document.getElementById('displayWord');
            const wordCard = document.getElementById('wordCard');
            const nextBtn = document.getElementById('nextWordBtn');
            const meaningHint = document.getElementById('meaningHint');
            const wordCountSpan = document.getElementById('wordCount');

            // 显示单词总数
            wordCountSpan.textContent = allowedWords.length;

            // 简易释义（仅作趣味参考）
            function getMeaningSuggestion(word) {
                const map = {
                    "at": "在 (地点/时间)",
                    "it": "它",
                    "in": "在…里面",
                    "is": "是",
                    "on": "在…上面",
                    "am": "是 (用于I)",
                    "an": "一个 (用于元音前)",
                    "as": "作为 / 如同"
                };
                return map[word] || '✅ 英语单词';
            }

            // 更新界面
            function updateDisplay() {
                const word = allowedWords[currentIndex];
                displayWordEl.textContent = word;
                meaningHint.textContent = '📘 ' + getMeaningSuggestion(word);
            }

            // 发音函数
            function speakCurrentWord() {
                const word = allowedWords[currentIndex];
                if (!word) return;
                
                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                    
                    const utterance = new SpeechSynthesisUtterance(word);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9;
                    utterance.pitch = 1.2;
                    utterance.volume = 1;
                    
                    window.speechSynthesis.speak(utterance);
                } else {
                    alert('浏览器不支持语音合成。');
                }
            }

            // 切换到下一个单词 (随机，且可能重复，完全随机)
            function nextWord() {
                // 完全随机抽取，可以抽到与当前相同（体现随机性）
                // 如果希望尽量不同，也可以稍作处理，但无妨
                const newIndex = Math.floor(Math.random() * allowedWords.length);
                currentIndex = newIndex;
                updateDisplay();
            }

            // 初始化随机
            function initRandom() {
                // 随机起始单词
                currentIndex = Math.floor(Math.random() * allowedWords.length);
                updateDisplay();
            }

            // 绑定事件
            wordCard.addEventListener('click', function(e) {
                e.stopPropagation();
                speakCurrentWord();
            });

            nextBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                nextWord();
            });

            // 启动
            initRandom();

        })();
    </script>
</body>
</html>
